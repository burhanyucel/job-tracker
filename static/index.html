<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Auth Section -->
    <div id="auth-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Job Tracker</h1>
            <p class="text-center text-gray-500 text-sm mb-6">Track your job applications with AI</p>
            <div id="message" class="hidden p-3 rounded-lg mb-4 text-sm"></div>
            <input id="email" type="email" placeholder="Email"
                class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:border-blue-500">
            <input id="password" type="password" placeholder="Password"
                class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-blue-500">
            <button onclick="login()"
                class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 font-semibold mb-2">
                Login
            </button>
            <button onclick="register()"
                class="w-full bg-gray-200 text-gray-700 p-3 rounded-lg hover:bg-gray-300 font-semibold">
                Register
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">

        <!-- Navbar -->
        <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">Job Tracker</h1>
            <div class="flex items-center gap-4">
                <span id="user-email" class="text-gray-600 text-sm"></span>
                <button onclick="logout()"
                    class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 text-sm">
                    Logout
                </button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto px-6 py-8">

            <!-- Stats -->
            <div id="stats" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8"></div>

            <!-- Add Job -->
            <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Add New Application</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="company" type="text" placeholder="Company name"
                        class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    <input id="position" type="text" placeholder="Position"
                        class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    <select id="status"
                        class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Offer">Offer</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                    <input id="notes" type="text" placeholder="Notes (optional)"
                        class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>
                <textarea id="description" placeholder="Job description (for AI analysis)"
                    class="w-full p-3 border border-gray-300 rounded-lg mt-4 focus:outline-none focus:border-blue-500 h-24"></textarea>
                <button onclick="addJob()"
                    class="mt-4 bg-green-500 text-white px-6 py-3 rounded-lg hover:bg-green-600 font-semibold">
                    Add Application
                </button>
            </div>

            <!-- Filter -->
            <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex gap-3 flex-wrap">
                <button onclick="filterJobs('all')" id="filter-all"
                    class="px-4 py-2 rounded-lg bg-blue-500 text-white text-sm font-semibold">All</button>
                <button onclick="filterJobs('Applied')" id="filter-Applied"
                    class="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 text-sm font-semibold">Applied</button>
                <button onclick="filterJobs('Interview')" id="filter-Interview"
                    class="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 text-sm font-semibold">Interview</button>
                <button onclick="filterJobs('Offer')" id="filter-Offer"
                    class="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 text-sm font-semibold">Offer</button>
                <button onclick="filterJobs('Rejected')" id="filter-Rejected"
                    class="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 text-sm font-semibold">Rejected</button>
            </div>

            <!-- Job List -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">My Applications</h2>
                <div id="job-list"></div>
            </div>

        </div>
    </div>

    <script>
        let token = localStorage.getItem("token");
        let userEmail = localStorage.getItem("email");
        let allJobs = [];
        let currentFilter = "all";

        const statusColors = {
            "Applied": "bg-blue-100 text-blue-700",
            "Interview": "bg-yellow-100 text-yellow-700",
            "Offer": "bg-green-100 text-green-700",
            "Rejected": "bg-red-100 text-red-700"
        };

        if (token) showApp();

        function showMessage(text, type) {
            const div = document.getElementById("message");
            div.textContent = text;
            div.className = type === "success"
                ? "p-3 rounded-lg mb-4 text-sm bg-green-100 text-green-700"
                : "p-3 rounded-lg mb-4 text-sm bg-red-100 text-red-700";
            div.classList.remove("hidden");
            setTimeout(() => div.classList.add("hidden"), 3000);
        }

        function showApp() {
            document.getElementById("auth-section").classList.add("hidden");
            document.getElementById("app").classList.remove("hidden");
            document.getElementById("user-email").textContent = userEmail;
            loadJobs();
            loadStats();
        }

        async function login() {
            const emailVal = document.getElementById("email").value;
            const passwordVal = document.getElementById("password").value;

            const response = await fetch("/giris", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `username=${emailVal}&password=${passwordVal}`
            });

            const data = await response.json();

            if (data.access_token) {
                localStorage.setItem("token", data.access_token);
                localStorage.setItem("email", emailVal);
                token = data.access_token;
                userEmail = emailVal;
                showApp();
            } else {
                showMessage("Invalid email or password", "error");
            }
        }

        async function register() {
            const emailVal = document.getElementById("email").value;
            const passwordVal = document.getElementById("password").value;

            const response = await fetch("/kayit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: emailVal, sifre: passwordVal })
            });

            const data = await response.json();

            if (data.mesaj) {
                showMessage("Registered successfully!", "success");
                await login();
            } else {
                showMessage(data.detail || "Error occurred", "error");
            }
        }

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("email");
            token = null;
            userEmail = null;
            document.getElementById("auth-section").classList.remove("hidden");
            document.getElementById("app").classList.add("hidden");
        }

        async function addJob() {
            const company = document.getElementById("company").value;
            const position = document.getElementById("position").value;
            const status = document.getElementById("status").value;
            const description = document.getElementById("description").value;
            const notes = document.getElementById("notes").value;

            if (!company || !position) {
                alert("Company and position are required");
                return;
            }

            const btn = event.target;
            btn.textContent = "Adding...";
            btn.disabled = true;

            const response = await fetch("/isler", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    sirket: company,
                    pozisyon: position,
                    durum: status,
                    aciklama: description,
                    notlar: notes
                })
            });

            btn.textContent = "Add Application";
            btn.disabled = false;

            document.getElementById("company").value = "";
            document.getElementById("position").value = "";
            document.getElementById("description").value = "";
            document.getElementById("notes").value = "";

            loadJobs();
            loadStats();
        }

        function filterJobs(filter) {
            currentFilter = filter;

            document.querySelectorAll("[id^='filter-']").forEach(btn => {
                btn.className = "px-4 py-2 rounded-lg bg-gray-200 text-gray-700 text-sm font-semibold";
            });
            document.getElementById(`filter-${filter}`).className =
                "px-4 py-2 rounded-lg bg-blue-500 text-white text-sm font-semibold";

            renderJobs();
        }

        function renderJobs() {
            const filtered = currentFilter === "all"
                ? allJobs
                : allJobs.filter(j => j.durum === currentFilter);

            const list = document.getElementById("job-list");

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-center py-8">No applications found</p>';
                return;
            }

            list.innerHTML = filtered.map(job => `
                <div class="border border-gray-200 rounded-lg p-4 mb-4">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-semibold text-gray-800">${job.pozisyon}</h3>
                            <p class="text-gray-600 text-sm">${job.sirket}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <select onchange="updateStatus(${job.id}, this.value)"
                                class="text-sm p-1 border border-gray-300 rounded ${statusColors[job.durum] || ''}">
                                <option ${job.durum === 'Applied' ? 'selected' : ''}>Applied</option>
                                <option ${job.durum === 'Interview' ? 'selected' : ''}>Interview</option>
                                <option ${job.durum === 'Offer' ? 'selected' : ''}>Offer</option>
                                <option ${job.durum === 'Rejected' ? 'selected' : ''}>Rejected</option>
                            </select>
                            <button onclick="deleteJob(${job.id})"
                                class="text-red-500 hover:text-red-700 text-sm">Delete</button>
                        </div>
                    </div>
                    ${job.notlar ? `<p class="text-gray-500 text-sm mt-1">Note: ${job.notlar}</p>` : ''}
                    ${job.ai_analiz ? `
                        <details class="mt-3">
                            <summary class="text-blue-500 text-sm cursor-pointer">View AI Analysis</summary>
                            <div class="mt-2 p-3 bg-blue-50 rounded-lg text-sm text-gray-700 whitespace-pre-wrap">${job.ai_analiz}</div>
                        </details>
                    ` : ''}
                    <p class="text-gray-400 text-xs mt-2">${new Date(job.basvuru_tarihi).toLocaleDateString("en-GB")}</p>
                </div>
            `).join('');
        }

        async function loadJobs() {
            const response = await fetch("/isler", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            allJobs = await response.json();
            renderJobs();
        }

        async function updateStatus(jobId, newStatus) {
            await fetch(`/isler/${jobId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ durum: newStatus })
            });
            loadJobs();
            loadStats();
        }

        async function deleteJob(jobId) {
            if (!confirm("Delete this application?")) return;
            await fetch(`/isler/${jobId}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            loadJobs();
            loadStats();
        }

        async function loadStats() {
            const response = await fetch("/istatistik", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await response.json();

            const statsDiv = document.getElementById("stats");
            const statColors = {
                "Applied": "border-blue-500",
                "Interview": "border-yellow-500",
                "Offer": "border-green-500",
                "Rejected": "border-red-500"
            };

            statsDiv.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm p-4 text-center border-t-4 border-gray-400">
                    <p class="text-3xl font-bold text-gray-800">${data.toplam}</p>
                    <p class="text-gray-500 text-sm mt-1">Total</p>
                </div>
                ${Object.entries(data.durumlar).map(([status, count]) => `
                    <div class="bg-white rounded-xl shadow-sm p-4 text-center border-t-4 ${statColors[status] || 'border-gray-400'}">
                        <p class="text-3xl font-bold text-gray-800">${count}</p>
                        <p class="text-gray-500 text-sm mt-1">${status}</p>
                    </div>
                `).join('')}
            `;
        }
    </script>
</body>
</html>
